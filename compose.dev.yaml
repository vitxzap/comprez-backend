services:
  postgres:
    container_name: postgres
    image: postgres:18.1-alpine3.23
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - 5432:5432
    volumes:
      - postgres:/var/lib/postgresql

  redis:
    container_name: redis
    image: redis:8.4-alpine3.22
    restart: always
    env_file:
      - .env
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD}']
    ports:
      - 6379:6379
    volumes:
      - redis_data:/var/lib/redis

  compressor_worker:
    container_name: compressor_worker
    image: oven/bun:1
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - REDIS_URL: ${REDIS_URL}
    depends_on:
      - redis
    command: bun run --watch queues/compressor/worker.ts


volumes:
  postgres:
  redis_data:
    driver: local